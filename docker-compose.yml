# Body Fat Tracker API (SQLite in volume). Build from repo root: docker compose build
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - DATABASE_URL=file:/data/body_fat_tracker.db
    volumes:
      - bft-data:/data

volumes:
  bft-data:
