# Body Fat Tracker
# - Local dev: run `docker compose up -d db` and set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/body_fat_tracker in backend/.env
# - Integration tests use DB body_fat_tracker_test. Create it once: docker compose exec -T db psql -U postgres -c "CREATE DATABASE body_fat_tracker_test;"
# - Optional: `api` service runs the backend in a container (legacy; app now uses PostgreSQL)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: body_fat_tracker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/body_fat_tracker
    depends_on:
      db:
        condition: service_healthy
