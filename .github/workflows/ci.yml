name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # Creates body_fat_tracker_test automatically (same name as local integration default in backend/package.json).
          POSTGRES_DB: body_fat_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/body_fat_tracker_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: backend

      - name: Unit tests
        run: npm run test
        working-directory: backend

      - name: Integration tests
        run: npm run test:integration
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Tests
        run: npm run test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
